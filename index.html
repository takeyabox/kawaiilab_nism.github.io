<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="かわらぼにずむ — ブラウザで遊べるリズムゲーム">
    <title>かわらぼにずむ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- YouTube player hidden behind game UI -->
    <div id="yt-container">
        <div id="yt-player"></div>
    </div>

    <!-- Background overlay -->
    <div id="bg-overlay"></div>

    <!-- ═══════════════════════════════════════════
         MENU SCREEN
    ═══════════════════════════════════════════ -->
    <div id="menu-screen" class="screen active">

        <!-- Left Panel: Jacket + Song Select + Start -->
        <div class="menu-left" id="menu-left-panel">
            <div class="game-title">
                <h1>かわらぼにずむ</h1>
            </div>

            <div class="jacket-wrap">
                <img id="jacket-img" src="" alt="jacket">
                <div class="jacket-glow" id="jacket-glow"></div>
            </div>

            <div class="song-meta">
                <div id="song-name">読み込み中...</div>
            </div>

            <div class="song-nav">
                <button class="nav-btn" id="btn-prev" aria-label="前の曲">&#9664;</button>
                <button class="start-btn" id="btn-start">START</button>
                <button class="nav-btn" id="btn-next" aria-label="次の曲">&#9654;</button>
            </div>

            <p class="key-hint-text">← → : 選曲 &nbsp;|&nbsp; Enter : 開始 &nbsp;|&nbsp; ↑ : 設定</p>
        </div>

        <!-- Right Panel: Settings -->
        <div class="menu-right" id="menu-right-panel">
            <div class="settings-panel">
                <h2 class="settings-title">⚙ SETTINGS</h2>

                <!-- Music Volume -->
                <div class="setting-row" id="setting-vol-music">
                    <label class="setting-label">🎵 BGM音量</label>
                    <div class="setting-control">
                        <button class="adj-btn" id="btn-vol-music-minus">−</button>
                        <div class="slider-wrap">
                            <input type="range" id="vol-music-slider" min="0" max="100" value="80">
                        </div>
                        <span class="setting-val" id="vol-music-display">80</span>
                        <button class="adj-btn" id="btn-vol-music-plus">＋</button>
                    </div>
                </div>

                <!-- SE Volume -->
                <div class="setting-row" id="setting-vol-se">
                    <label class="setting-label">✨ SE音量</label>
                    <div class="setting-control">
                        <button class="adj-btn" id="btn-vol-se-minus">−</button>
                        <div class="slider-wrap">
                            <input type="range" id="vol-se-slider" min="0" max="100" value="80">
                        </div>
                        <span class="setting-val" id="vol-se-display">80</span>
                        <button class="adj-btn" id="btn-vol-se-plus">＋</button>
                    </div>
                </div>

                <!-- Note Delay (Offset) -->
                <div class="setting-row" id="setting-offset">
                    <label class="setting-label">⏱ ノーツ遅延</label>
                    <div class="setting-control">
                        <button class="adj-btn" id="btn-offset-minus">−</button>
                        <span class="setting-val wide" id="offset-display">0 ms</span>
                        <button class="adj-btn" id="btn-offset-plus">＋</button>
                    </div>
                </div>

                <!-- Note Speed -->
                <div class="setting-row" id="setting-speed">
                    <label class="setting-label">💨 ノーツ速度</label>
                    <div class="setting-control">
                        <button class="adj-btn" id="btn-speed-minus">−</button>
                        <span class="setting-val wide" id="speed-display">1.5 s</span>
                        <button class="adj-btn" id="btn-speed-plus">＋</button>
                    </div>
                </div>

                <!-- Auto Mode -->
                <div class="setting-row" id="setting-auto">
                    <label class="setting-label">🤖 オートモード</label>
                    <div class="setting-control">
                        <span class="setting-val wide" id="auto-display">OFF</span>
                        <button class="adj-btn" id="btn-auto-toggle" style="width:auto; padding:0 12px; margin-left:8px;">切替</button>
                    </div>
                </div>

                <!-- MV Mode -->
                <div class="setting-row" id="setting-mv">
                    <label class="setting-label">📺 MV再生</label>
                    <div class="setting-control">
                        <span class="setting-val wide" id="mv-display">全画面</span>
                        <button class="adj-btn" id="btn-mv-toggle" style="width:auto; padding:0 12px; margin-left:8px;">切替</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Loading overlay shown while buffering -->
        <div id="loading-overlay" class="loading-hidden">
            <div class="loading-spinner"></div>
            <p id="loading-text">動画を読み込み中...</p>
        </div>

    </div><!-- /#menu-screen -->


    <!-- ═══════════════════════════════════════════
         GAME SCREEN
    ═══════════════════════════════════════════ -->
    <div id="game-screen" class="screen">

        <!-- Top HUD -->
        <div id="game-hud">
            <div id="hud-left">
                <button class="hud-btn" id="btn-pause" aria-label="一時停止">⏸</button>
                <button class="hud-btn" id="btn-quit"  aria-label="中断">⏹</button>
            </div>
            <div id="hud-center">
                <span id="song-name-hud"></span>
            </div>
            <div id="hud-right">
                <span class="score-label">SCORE</span>
                <span id="score-pct">0.00%</span>
            </div>
        </div>

        <!-- Combo + Judgement -->
        <div id="combo-display"><span id="combo-num">0</span></div>
        <div id="judge-display"></div>

        <!-- Note Lanes -->
        <div id="lanes-wrap">
            <div id="lanes">
                <div class="lane" id="lane-0">
                    <div class="hit-zone"></div>
                    <div class="key-label pc-only">D</div>
                </div>
                <div class="lane" id="lane-1">
                    <div class="hit-zone"></div>
                    <div class="key-label pc-only">F</div>
                </div>
                <div class="lane" id="lane-2">
                    <div class="hit-zone"></div>
                    <div class="key-label pc-only">J</div>
                </div>
                <div class="lane" id="lane-3">
                    <div class="hit-zone"></div>
                    <div class="key-label pc-only">K</div>
                </div>
            </div>
        </div>

        <!-- Touch overlay for note input -->
        <div id="touch-overlay">
            <div class="t-lane" data-lane="0"></div>
            <div class="t-lane" data-lane="1"></div>
            <div class="t-lane" data-lane="2"></div>
            <div class="t-lane" data-lane="3"></div>
        </div>

        <!-- Pause Overlay -->
        <div id="pause-overlay">
            <div class="pause-box">
                <h2>PAUSE</h2>
                <p class="pc-only">Space で再開 / Enter で中断</p>
                <div class="pause-btns">
                    <button id="btn-resume">▶ 再開</button>
                    <button id="btn-quit-pause">⏹ 中断</button>
                </div>
            </div>
        </div>

    </div><!-- /#game-screen -->


    <!-- ═══════════════════════════════════════════
         RESULT SCREEN
    ═══════════════════════════════════════════ -->
    <div id="result-screen" class="screen">
        <div class="result-box">
            <h2 class="result-title">RESULT</h2>
            <div id="result-jacket-wrap">
                <img id="result-jacket" src="" alt="jacket">
            </div>
            <div id="result-song-name"></div>

            <div class="result-score-big">
                <span id="result-score">0.00</span><span class="pct-label">%</span>
            </div>

            <div class="result-grid">
                <div class="result-row">
                    <span class="rlab perfect-col">PERFECT</span>
                    <span class="rval" id="r-perfect">0</span>
                </div>
                <div class="result-row">
                    <span class="rlab great-col">GREAT</span>
                    <span class="rval" id="r-great">0</span>
                </div>
                <div class="result-row">
                    <span class="rlab miss-col">MISS</span>
                    <span class="rval" id="r-miss">0</span>
                </div>
                <div class="result-row">
                    <span class="rlab combo-col">MAX COMBO</span>
                    <span class="rval" id="r-maxcombo">0</span>
                </div>
            </div>

            <button class="back-btn" id="btn-back-menu">MENU に戻る</button>
        </div>
    </div><!-- /#result-screen -->


    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
